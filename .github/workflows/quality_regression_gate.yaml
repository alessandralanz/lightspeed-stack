name: Quality Regression Gate

on: [pull_request]

jobs:
  # ================================================================
  # Run A: main branch + old OKP (only when OKP is enabled)
  # ================================================================
  run_a:
    runs-on: ubuntu-latest
    if: vars.ENABLE_OKP_RUNS == 'true'
    name: "Run A: main + old OKP"

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      E2E_OPENAI_MODEL: ${{ vars.E2E_OPENAI_MODEL }}
      FAISS_VECTOR_STORE_ID: ${{ vars.FAISS_VECTOR_STORE_ID }}
      RH_SERVER_OKP: ${{ secrets.RH_SERVER_OKP }}

    steps:
      - name: Checkout lightspeed-stack (main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'

      - name: Checkout lightspeed-evaluation
        uses: actions/checkout@v4
        with:
          repository: alessandralanz/lightspeed-evaluation
          ref: lcore-regression
          path: lightspeed-evaluation

      - name: Copy run.yaml
        run: |
          CONFIG_FILE="./lightspeed-evaluation/tests/integration/run.yaml"
          if [ ! -f "${CONFIG_FILE}" ]; then
            echo "Configuration file not found: ${CONFIG_FILE}"
            exit 1
          fi
          cp "$CONFIG_FILE" run.yaml

      - name: Install dependencies
        run: |
          pip install --break-system-packages uv
          cd lightspeed-evaluation
          uv sync

      - name: Load OKP configuration
        run: |
          cp tests/e2e/configuration/library-mode/lightspeed-stack-okp-regression.yaml \
             lightspeed-stack.yaml
          echo "Run A: OKP configuration loaded (main branch)"

      - name: Start services and wait
        run: |
          echo "Run A: Starting service in library mode (main branch)"
          docker compose -f docker-compose-library.yaml up -d --build

          if docker compose -f docker-compose-library.yaml ps | grep -E 'Exit|exited|stopped'; then
            echo "Run A: Service failed to start"
            docker compose -f docker-compose-library.yaml logs
            exit 1
          fi

          echo "Run A: Waiting for service on port 8080..."
          for i in {1..30}; do
            if curl --output /dev/null --fail http://localhost:8080/v1/models ; then
              echo "Run A: Service is up!"
              exit 0
            fi
            echo "Still waiting... (attempt $i/30)"
            sleep 2
          done

          echo "Run A: Service did not start in time"
          docker compose -f docker-compose-library.yaml logs lightspeed-stack --tail=50
          exit 1

      - name: Run evaluation
        run: |
          cd lightspeed-evaluation
          echo "Run A: Running evaluation (main + old OKP)..."
          uv run lightspeed-eval \
            --system-config config/lcore_regression/system-config-pr-gate.yaml \
            --eval-data eval_data/lcore_regression/okp_rag_quality.yaml \
            --output-dir eval_output/abc_comparison/run_a

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose-library.yaml down
          echo "Run A: Services stopped"

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-a
          path: |
            lightspeed-evaluation/eval_output/abc_comparison/run_a/
          retention-days: 30

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Stack logs ==="
          docker compose -f docker-compose-library.yaml logs lightspeed-stack --tail=50 2>/dev/null || true

  # ================================================================
  # Run B: main branch + new OKP (only when OKP is enabled)
  # ================================================================
  run_b:
    runs-on: ubuntu-latest
    if: vars.ENABLE_OKP_RUNS == 'true'
    name: "Run B: main + new OKP"

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      E2E_OPENAI_MODEL: ${{ vars.E2E_OPENAI_MODEL }}
      FAISS_VECTOR_STORE_ID: ${{ vars.FAISS_VECTOR_STORE_ID }}
      RH_SERVER_OKP: ${{ secrets.RH_SERVER_OKP }}

    steps:
      - name: Checkout lightspeed-stack (main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'

      - name: Checkout lightspeed-evaluation
        uses: actions/checkout@v4
        with:
          repository: alessandralanz/lightspeed-evaluation
          ref: lcore-regression
          path: lightspeed-evaluation

      - name: Copy run.yaml
        run: |
          CONFIG_FILE="./lightspeed-evaluation/tests/integration/run.yaml"
          if [ ! -f "${CONFIG_FILE}" ]; then
            echo "Configuration file not found: ${CONFIG_FILE}"
            exit 1
          fi
          cp "$CONFIG_FILE" run.yaml

      - name: Install dependencies
        run: |
          pip install --break-system-packages uv
          cd lightspeed-evaluation
          uv sync

      - name: Load OKP configuration
        run: |
          # TODO: When OKP old/new image tags are available, configure
          # the new OKP image here (different from Run A's old image).
          # For now, same config as Run A.
          cp tests/e2e/configuration/library-mode/lightspeed-stack-okp-regression.yaml \
             lightspeed-stack.yaml
          echo "Run B: OKP configuration loaded (main branch, new OKP)"

      - name: Start services and wait
        run: |
          echo "Run B: Starting service in library mode (main branch, new OKP)"
          docker compose -f docker-compose-library.yaml up -d --build

          if docker compose -f docker-compose-library.yaml ps | grep -E 'Exit|exited|stopped'; then
            echo "Run B: Service failed to start"
            docker compose -f docker-compose-library.yaml logs
            exit 1
          fi

          echo "Run B: Waiting for service on port 8080..."
          for i in {1..30}; do
            if curl --output /dev/null --fail http://localhost:8080/v1/models ; then
              echo "Run B: Service is up!"
              exit 0
            fi
            echo "Still waiting... (attempt $i/30)"
            sleep 2
          done

          echo "Run B: Service did not start in time"
          docker compose -f docker-compose-library.yaml logs lightspeed-stack --tail=50
          exit 1

      - name: Run evaluation
        run: |
          cd lightspeed-evaluation
          echo "Run B: Running evaluation (main + new OKP)..."
          uv run lightspeed-eval \
            --system-config config/lcore_regression/system-config-pr-gate.yaml \
            --eval-data eval_data/lcore_regression/okp_rag_quality.yaml \
            --output-dir eval_output/abc_comparison/run_b

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose-library.yaml down
          echo "Run B: Services stopped"

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-b
          path: |
            lightspeed-evaluation/eval_output/abc_comparison/run_b/
          retention-days: 30

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Stack logs ==="
          docker compose -f docker-compose-library.yaml logs lightspeed-stack --tail=50 2>/dev/null || true

  # ================================================================
  # Run C: PR branch + new OKP (only when OKP is enabled)
  # ================================================================
  run_c:
    runs-on: ubuntu-latest
    if: vars.ENABLE_OKP_RUNS == 'true'
    name: "Run C: PR branch + new OKP"

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      E2E_OPENAI_MODEL: ${{ vars.E2E_OPENAI_MODEL }}
      FAISS_VECTOR_STORE_ID: ${{ vars.FAISS_VECTOR_STORE_ID }}
      RH_SERVER_OKP: ${{ secrets.RH_SERVER_OKP }}

    steps:
      - name: Checkout lightspeed-stack
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Checkout lightspeed-evaluation
        uses: actions/checkout@v4
        with:
          repository: alessandralanz/lightspeed-evaluation
          ref: lcore-regression
          path: lightspeed-evaluation

      - name: Copy run.yaml
        run: |
          CONFIG_FILE="./lightspeed-evaluation/tests/integration/run.yaml"
          if [ ! -f "${CONFIG_FILE}" ]; then
            echo "Configuration file not found: ${CONFIG_FILE}"
            exit 1
          fi
          cp "$CONFIG_FILE" run.yaml

      - name: Install dependencies
        run: |
          pip install --break-system-packages uv
          cd lightspeed-evaluation
          uv sync

      - name: Load OKP configuration
        run: |
          cp tests/e2e/configuration/library-mode/lightspeed-stack-okp-regression.yaml \
             lightspeed-stack.yaml
          echo "Run C: OKP configuration loaded (PR branch)"

      - name: Start services and wait
        run: |
          echo "Run C: Starting service in library mode (PR branch)"
          docker compose -f docker-compose-library.yaml up -d

          if docker compose -f docker-compose-library.yaml ps | grep -E 'Exit|exited|stopped'; then
            echo "Run C: Service failed to start"
            docker compose -f docker-compose-library.yaml logs
            exit 1
          fi

          echo "Run C: Waiting for service on port 8080..."
          for i in {1..30}; do
            if curl --output /dev/null --fail http://localhost:8080/v1/models ; then
              echo "Run C: Service is up!"
              exit 0
            fi
            echo "Still waiting... (attempt $i/30)"
            sleep 2
          done

          echo "Run C: Service did not start in time"
          docker compose -f docker-compose-library.yaml logs lightspeed-stack --tail=50
          exit 1

      - name: Run evaluation
        run: |
          cd lightspeed-evaluation
          echo "Run C: Running evaluation (PR branch)..."
          uv run lightspeed-eval \
            --system-config config/lcore_regression/system-config-pr-gate.yaml \
            --eval-data eval_data/lcore_regression/okp_rag_quality.yaml \
            --output-dir eval_output/abc_comparison/run_c

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose-library.yaml down
          echo "Run C: Services stopped"

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-c
          path: |
            lightspeed-evaluation/eval_output/abc_comparison/run_c/
          retention-days: 30

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Stack logs ==="
          docker compose -f docker-compose-library.yaml logs lightspeed-stack --tail=50 2>/dev/null || true

  # ================================================================
  # Compare: download artifacts and run A/B/C comparison
  # ================================================================
  compare:
    runs-on: ubuntu-latest
    needs: [run_a, run_b, run_c]
    if: always()
    name: "Compare A/B/C Results"
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout lightspeed-evaluation
        uses: actions/checkout@v4
        with:
          repository: alessandralanz/lightspeed-evaluation
          ref: lcore-regression
          path: lightspeed-evaluation

      - name: Install dependencies
        run: |
          pip install --break-system-packages uv
          cd lightspeed-evaluation
          uv sync

      - name: Create output directories
        run: |
          mkdir -p lightspeed-evaluation/eval_output/abc_comparison/run_a
          mkdir -p lightspeed-evaluation/eval_output/abc_comparison/run_b
          mkdir -p lightspeed-evaluation/eval_output/abc_comparison/run_c

      - name: Download Run C results
        uses: actions/download-artifact@v4
        with:
          name: eval-run-c
          path: lightspeed-evaluation/eval_output/abc_comparison/run_c

      - name: Download Run A results
        if: needs.run_a.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: eval-run-a
          path: lightspeed-evaluation/eval_output/abc_comparison/run_a

      - name: Download Run B results
        if: needs.run_b.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: eval-run-b
          path: lightspeed-evaluation/eval_output/abc_comparison/run_b

      - name: Run A/B/C regression comparison
        run: |
          cd lightspeed-evaluation

          COMPARE_CMD="uv run python -m script.regression.compare_abc_runs"
          COMPARE_CMD="${COMPARE_CMD} --run-c eval_output/abc_comparison/run_c"
          COMPARE_CMD="${COMPARE_CMD} --baseline baselines/lcore_regression"

          if ls eval_output/abc_comparison/run_a/*_summary.json 1>/dev/null 2>&1; then
            COMPARE_CMD="${COMPARE_CMD} --run-a eval_output/abc_comparison/run_a"
            echo "Including Run A results in comparison"
          fi

          if ls eval_output/abc_comparison/run_b/*_summary.json 1>/dev/null 2>&1; then
            COMPARE_CMD="${COMPARE_CMD} --run-b eval_output/abc_comparison/run_b"
            echo "Including Run B results in comparison"
          fi

          COMPARE_CMD="${COMPARE_CMD} --output eval_output/abc_comparison/regression_summary.md"
          COMPARE_CMD="${COMPARE_CMD} --fail-on-pr-regression"

          echo "Running: ${COMPARE_CMD}"
          eval ${COMPARE_CMD}

      - name: Build PR comment body
        if: always() && github.event_name == 'pull_request'
        id: build-comment
        run: |
          SUMMARY_FILE="lightspeed-evaluation/eval_output/abc_comparison/regression_summary.md"
          {
            echo "<!-- quality-regression-gate -->"
            echo "## Quality Regression Gate"
            echo ""
            echo "**Commit:** \`${{ github.event.pull_request.head.sha }}\`"
            echo "**Workflow run:** [View details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            if [ -f "${SUMMARY_FILE}" ]; then
              cat "${SUMMARY_FILE}"
            elif [ "${{ needs.run_c.result }}" == "skipped" ]; then
              echo "> **Skipped:** OKP evaluation runs are disabled. Set \`ENABLE_OKP_RUNS=true\` in repository variables to enable the quality regression gate."
            else
              echo "> **Error:** Regression comparison failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            fi
            echo ""
            echo "---"
            echo "*Auto-generated by the Quality Regression Gate*"
          } > /tmp/pr-comment-body.md

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          cat /tmp/pr-comment-body.md >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Find existing regression comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- quality-regression-gate -->'

      - name: Post regression results to PR
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.build-comment.outputs.body }}
          edit-mode: replace

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: |
            lightspeed-evaluation/eval_output/abc_comparison/regression_summary.md
            lightspeed-evaluation/eval_output/abc_comparison/run_a/*_summary.json
            lightspeed-evaluation/eval_output/abc_comparison/run_a/*_summary.txt
            lightspeed-evaluation/eval_output/abc_comparison/run_b/*_summary.json
            lightspeed-evaluation/eval_output/abc_comparison/run_b/*_summary.txt
            lightspeed-evaluation/eval_output/abc_comparison/run_c/*_summary.json
            lightspeed-evaluation/eval_output/abc_comparison/run_c/*_summary.txt
          retention-days: 30

      - name: Show regression summary on failure
        if: failure()
        run: |
          echo "=== Regression summary ==="
          cat lightspeed-evaluation/eval_output/abc_comparison/regression_summary.md 2>/dev/null || echo "No summary generated"
